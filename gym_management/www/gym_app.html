<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
	<meta name="theme-color" content="#0a0a0f" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-title" content="SG Fitness" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<title>SG Fitness</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<link rel="manifest" href="/assets/gym_management/gym_pwa/manifest.webmanifest" />
	<link rel="icon" href="/assets/gym_management/gym_pwa/icon.svg" type="image/svg+xml" />
	<link rel="apple-touch-icon" href="/assets/gym_management/gym_pwa/icon-192.png" />
	<link rel="stylesheet" href="/assets/gym_management/gym_pwa/css/app.css" />
</head>
<body>
	<div class="app-bg" aria-hidden="true"></div>
	<div id="app">
		<div id="screen-login" class="screen active">
			<div class="login-wrap">
				<div class="login-hero">
					<div class="login-logo">
						<img src="/assets/gym_management/gym_pwa/sg-fitness-logo.png" alt="SG Fitness" width="140" height="140" />
					</div>
					<p class="login-tagline">Member check-in & check-out</p>
				</div>
				<div class="login-card glass">
					<form id="login-form">
						<div class="field">
							<label for="login-user">Username</label>
							<input type="text" id="login-user" placeholder="email@example.com" autocomplete="username" required />
						</div>
						<div class="field">
							<label for="login-password">Password</label>
							<input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
						</div>
						<p id="login-error" class="error hidden"></p>
						<button type="submit" class="btn btn-primary btn-block">
							<span>Sign In</span>
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
						</button>
					</form>
				</div>
			</div>
		</div>

		<div id="screen-app" class="screen">
			<header class="topbar glass">
				<div class="topbar-left">
					<p class="topbar-label" id="gym-name">Gym</p>
					<h2 id="page-title">Home</h2>
				</div>
				<div class="topbar-right">
					<span class="live-clock" id="live-clock"></span>
					<button type="button" class="btn-icon" id="btn-logout" title="Logout" aria-label="Logout">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
					</button>
				</div>
			</header>

			<main class="main" id="main-content"></main>

			<nav class="tabbar glass" aria-label="Main navigation">
				<button type="button" class="tab active" data-view="home">
					<span class="tab-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10"/></svg>
					</span>
					<span class="tab-label">Home</span>
				</button>
				<button type="button" class="tab" data-view="members">
					<span class="tab-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
					</span>
					<span class="tab-label">Members</span>
				</button>
				<button type="button" class="tab" data-view="attendance">
					<span class="tab-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
					</span>
					<span class="tab-label">Today</span>
				</button>
			</nav>
		</div>

		<div id="toast" class="toast hidden" role="status"></div>
	</div>

	<script>
		window.gym_pwa = {
			csrf_token: "{{ csrf_token }}",
			site_name: "{{ site_name }}",
		};
	</script>
	<script src="/assets/gym_management/gym_pwa/js/app.js"></script>
</body>
</html>
